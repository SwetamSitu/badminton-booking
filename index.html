<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badminton Court Bookings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>🏸 Badminton Court Bookings</h1>
      <p>View, add, and update our badminton court booking details.</p>
    </section>

    <section class="card">
      <h2>Add / Update Booking</h2>
      <form id="bookingForm">
        <input type="hidden" id="id" />

        <label>Name</label>
        <input id="name" type="text" placeholder="e.g. Swetam" required />

        <label>Place</label>
        <input id="place" type="text" placeholder="e.g. Triangle Leisure Centre" required />

        <label>Date</label>
        <input id="date" type="date" required />

        <label>Timing</label>
        <input id="timing" type="text" placeholder="e.g. 7:00 PM - 8:00 PM" required />

        <label>Court Number</label>
        <input id="court" type="text" placeholder="e.g. Court 3" required />

        <label>Players</label>
        <input id="players" type="text" placeholder="e.g. Swetam, Amit, Rahul" />

        <label>Notes</label>
        <textarea id="notes" placeholder="Optional notes"></textarea>

        <button type="submit">Save Booking</button>
        <button type="button" class="secondary" onclick="resetForm()">Clear</button>
      </form>
      <p id="status"></p>
    </section>

    <section class="card">
      <div class="tableHeader">
        <h2>Current Bookings</h2>
        <button onclick="loadBookings()">Refresh</button>
      </div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Timing</th>
              <th>Place</th>
              <th>Court</th>
              <th>Name</th>
              <th>Players</th>
              <th>Notes</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="bookingTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
